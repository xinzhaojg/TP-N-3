

@if (productos.length > 0) { 
  <div class="row"> 
    @for (p of productos; track p.id) { 
      <div class="col-md-4 mb-4"> 
        <app-producto-card 
          [producto]="p" 
          (agregarAlCarrito)="onAgregar($event)"> 
        </app-producto-card> 
      </div> 
    } 
  </div> 
} @else { 
  <p class="text-muted">No hay productos disponibles por el momento.</p> 
}
