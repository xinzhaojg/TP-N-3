<!-- app.html — estructura sugerida con Bootstrap --> 
<div class="card mx-auto" style="max-width: 400px;"> 
  <div class="card-body text-center"> 
 
    <!-- Foto con borde según estado --> 
    <img [src]="urlFoto" class="rounded-circle mb-3" 
         [ngClass]="{'border border-success border-3': estaOnline, 
                      'border border-secondary border-3': !estaOnline}"> 
 
    <!-- Nombre y badge de estado --> 
    <h4>{{ nombre }}</h4> 
    <p class="text-muted">{{ usuario }}</p> 
    <span class="badge" [ngClass]="estaOnline ? 'bg-success' : 
'bg-secondary'"> 
      {{ estaOnline ? 'Online' : 'Desconectado' }} 
    </span> 
 
    <!-- Bio y estadísticas --> 
    <p class="mt-3">{{ bio }}</p> 
    <p><strong>{{ seguidores }}</strong> seguidores · <strong>{{ seguidos 
}}</strong> seguidos</p> 
 <!-- Botón seguir --> 
    <button class="btn" [ngClass]="siguiendo ? 'btn-success' : 
'btn-primary'" 
            (click)="toggleSeguir()"> 
      {{ siguiendo ? 'Siguiendo ✓' : 'Seguir' }} 
    </button> 
 

    <button class="btn btn-secondary" [ngClass]="estaOnline ? 'btn-success' : 
'btn-primary'" 
            (click)="toggleOnline()"> 
      {{ estaOnline ? 'Desconectarse ' : 'Conectarse' }} 
    </button> 
  </div> 
</div>
