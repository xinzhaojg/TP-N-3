<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>{{nombre}}</h1>
<p>{{edad}}</p>
<p>{{ciudad}}</p>
<p>{{activo}}</p>


<p [style.color]="activo ? 'green' : 'red'" >{{nombre}}</p>
<button (click)="toggle()">
{{activo ? `Desactivar` : `Activar`}}
</button>


<p [class.destacado]="destacado" (click)="toggleDestacado()">
  Hacé para destacarme
</p>


</body>
</html>
